<svg viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',system-ui,sans-serif">
  <defs>
    <filter id="f1b2-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="f1b2-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#10B981"/>
    </marker>
  </defs>
  <rect width="320" height="240" fill="#FFFFFF"/>

  <!-- Reminus Container (outer box) -->
  <g filter="url(#f1b2-shadow)">
    <rect x="8" y="30" width="156" height="194" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="1.6"/>
  </g>
  <!-- Header band (top-rounded only) -->
  <path d="M8 42 Q8 30 20 30 L152 30 Q164 30 164 42 L164 62 L8 62 Z" fill="#10B981"/>
  <text x="20" y="46" fill="#FFFFFF" fill-opacity="0.85" font-size="7" font-weight="700" letter-spacing="2">CTOパートナー</text>
  <text x="20" y="58" fill="#FFFFFF" font-size="11" font-weight="800" letter-spacing="0.5">Reminus</text>

  <!-- Sub label -->
  <text x="20" y="78" fill="#64748B" font-size="8" font-weight="700" letter-spacing="0.5">社内 CTO プール</text>
  <line x1="20" y1="83" x2="152" y2="83" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Pool rows -->
  <!-- Row 1 -->
  <g>
    <circle cx="30" cy="100" r="6" fill="#CBD5E1"/>
    <rect x="40" y="95" width="50" height="3" rx="1.5" fill="#CBD5E1"/>
    <rect x="40" y="102" width="34" height="3" rx="1.5" fill="#E2E8F0"/>
  </g>
  <!-- Row 2 SELECTED -->
  <g>
    <rect x="16" y="116" width="140" height="28" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.6"/>
    <circle cx="30" cy="130" r="7" fill="#1E3A8A"/>
    <rect x="42" y="124" width="48" height="3.2" rx="1.5" fill="#1E3A8A"/>
    <rect x="42" y="131" width="32" height="3.2" rx="1.5" fill="#64748B"/>
    <rect x="100" y="122" width="48" height="16" rx="8" fill="#10B981"/>
    <text x="124" y="133" fill="#FFFFFF" font-size="8.5" font-weight="800" text-anchor="middle">✓ 担当</text>
  </g>
  <!-- Row 3 -->
  <g>
    <circle cx="30" cy="158" r="6" fill="#CBD5E1"/>
    <rect x="40" y="153" width="42" height="3" rx="1.5" fill="#CBD5E1"/>
    <rect x="40" y="160" width="30" height="3" rx="1.5" fill="#E2E8F0"/>
  </g>
  <!-- Row 4 -->
  <g>
    <circle cx="30" cy="178" r="6" fill="#CBD5E1"/>
    <rect x="40" y="173" width="46" height="3" rx="1.5" fill="#CBD5E1"/>
    <rect x="40" y="180" width="32" height="3" rx="1.5" fill="#E2E8F0"/>
  </g>

  <!-- Footer caption inside box -->
  <line x1="20" y1="196" x2="152" y2="196" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="86" y="211" fill="#10B981" font-size="8" font-weight="800" text-anchor="middle" letter-spacing="0.5">社内で担当者を確定</text>

  <!-- Arrow: Reminus (as entity) → Client -->
  <g>
    <!-- bold arrow shaft, origin FROM Reminus box -->
    <path d="M166 124 L220 124" stroke="#10B981" stroke-width="3" stroke-linecap="round" fill="none" marker-end="url(#f1b2-arrow)"/>
    <!-- simple label below arrow -->
    <text x="193" y="140" fill="#10B981" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.5">参画</text>
  </g>

  <!-- Client card (right) -->
  <g filter="url(#f1b2-shadow)">
    <rect x="226" y="42" width="84" height="162" rx="10" fill="#1E3A8A"/>
  </g>
  <text x="268" y="58" fill="#A7F3D0" font-size="7" font-weight="700" text-anchor="middle" letter-spacing="2">CLIENT</text>
  <text x="268" y="74" fill="#FFFFFF" font-size="10" font-weight="800" text-anchor="middle">お客様</text>
  <line x1="234" y1="82" x2="302" y2="82" stroke="#34D399" stroke-width="0.8" opacity="0.4"/>

  <!-- 5 domain chips (vertical single-column for narrower card) -->
  <g font-size="9" font-weight="700" fill="#FFFFFF">
    <rect x="234" y="90" width="68" height="18" rx="9" fill="#34D399" fill-opacity="0.18" stroke="#34D399" stroke-width="1"/>
    <text x="268" y="103" text-anchor="middle">技術</text>
    <rect x="234" y="112" width="68" height="18" rx="9" fill="#34D399" fill-opacity="0.18" stroke="#34D399" stroke-width="1"/>
    <text x="268" y="125" text-anchor="middle" font-size="8">プロダクト</text>
    <rect x="234" y="134" width="68" height="18" rx="9" fill="#34D399" fill-opacity="0.18" stroke="#34D399" stroke-width="1"/>
    <text x="268" y="147" text-anchor="middle">組織</text>
    <rect x="234" y="156" width="68" height="18" rx="9" fill="#34D399" fill-opacity="0.18" stroke="#34D399" stroke-width="1"/>
    <text x="268" y="169" text-anchor="middle">戦略</text>
    <rect x="234" y="178" width="68" height="18" rx="9" fill="#34D399" fill-opacity="0.18" stroke="#34D399" stroke-width="1"/>
    <text x="268" y="191" text-anchor="middle">実行</text>
  </g>
</svg>
