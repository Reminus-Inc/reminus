<svg viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',system-ui,sans-serif">
  <rect width="320" height="240" fill="#FFFFFF"/>

  <g transform="translate(0, 10)">
  <!-- center separator -->
  <text x="160" y="128" fill="#CBD5E1" font-size="16" font-weight="300" text-anchor="middle">/</text>

  <!-- ============ A : 一般顧問 ============ -->
  <g>
    <!-- team disc: outlined only -->
    <circle cx="80" cy="120" r="54" fill="none" stroke="#CBD5E1" stroke-width="1.3"/>
    <!-- team members inside (muted) -->
    <g fill="#CBD5E1">
      <circle cx="62" cy="106" r="6"/>
      <circle cx="98" cy="106" r="6"/>
      <circle cx="62" cy="134" r="6"/>
      <circle cx="98" cy="134" r="6"/>
    </g>
    <!-- CTO OUTSIDE the disc -->
    <circle cx="132" cy="58" r="10" fill="#94A3B8"/>
    <!-- thin dashed connection (barely in touch) -->
    <line x1="125" y1="65" x2="118" y2="80" stroke="#CBD5E1" stroke-width="1.2" stroke-dasharray="2 3"/>
    <!-- label -->
    <text x="80" y="202" fill="#64748B" font-size="12" font-weight="700" text-anchor="middle">一般的な顧問</text>
  </g>

  <!-- ============ B : Reminus ============ -->
  <g>
    <!-- team disc: solid navy (flat) -->
    <circle cx="240" cy="120" r="54" fill="#1E3A8A"/>
    <!-- team members inside (white) -->
    <g fill="#FFFFFF">
      <circle cx="222" cy="106" r="6"/>
      <circle cx="258" cy="106" r="6"/>
      <circle cx="222" cy="134" r="6"/>
      <circle cx="258" cy="134" r="6"/>
    </g>
    <!-- Reminus CTO: emerald, slightly larger, inside at center -->
    <circle cx="240" cy="120" r="11" fill="#10B981"/>
    <!-- label -->
    <text x="240" y="202" fill="#1E3A8A" font-size="12" font-weight="800" text-anchor="middle">Reminus</text>
  </g>
  </g>
</svg>
