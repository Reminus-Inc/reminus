<svg viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',system-ui,sans-serif">
  <defs>
    <filter id="f3b-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="f3b-em-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <rect width="320" height="240" fill="#FFFFFF"/>

  <g transform="translate(0, -20)">
  <!-- Row 1: 正社員CTO -->
  <text x="20" y="54" fill="#64748B" font-size="10" font-weight="800">正社員CTO</text>
  <text x="20" y="66" fill="#94A3B8" font-size="8" font-weight="600">雇用リスクあり</text>
  <!-- bar -->
  <rect x="20" y="74" width="280" height="22" rx="11" fill="#F1F5F9"/>
  <rect x="20" y="74" width="280" height="22" rx="11" fill="#94A3B8"/>
  <text x="160" y="89" fill="#FFFFFF" font-size="11" font-weight="800" text-anchor="middle" letter-spacing="0.5">年収 1,000万 〜 2,000万円</text>

  <!-- Row 2: Reminus -->
  <text x="20" y="118" fill="#1E3A8A" font-size="10" font-weight="800">Reminus</text>
  <text x="20" y="130" fill="#10B981" font-size="8" font-weight="700">代行で低リスク・独自ノウハウで品質◎</text>
  <!-- bar -->
  <rect x="20" y="138" width="280" height="22" rx="11" fill="#ECFDF5"/>
  <rect x="20" y="138" width="126" height="22" rx="11" fill="url(#f3b-em-grad)" filter="url(#f3b-shadow)"/>
  <text x="83" y="153" fill="#FFFFFF" font-size="11" font-weight="800" text-anchor="middle">リーズナブル</text>
  <!-- soft supplementary label -->
  <g stroke="#10B981" stroke-width="1.2" fill="none">
    <line x1="150" y1="149" x2="170" y2="149" stroke-dasharray="2 2"/>
  </g>
  <text x="174" y="153" fill="#10B981" font-size="9" font-weight="800">コア機能をしっかり提供</text>

  <!-- Trial timeline -->
  <g>
    <rect x="20" y="186" width="280" height="40" rx="8" fill="#1E1B4B"/>
    <!-- trial segment -->
    <rect x="28" y="196" width="110" height="20" rx="10" fill="#10B981"/>
    <text x="83" y="210" fill="#FFFFFF" font-size="10" font-weight="800" text-anchor="middle">2ヶ月トライアル</text>
    <!-- arrow -->
    <g stroke="#D3B36B" stroke-width="1.5" fill="none" stroke-linecap="round">
      <line x1="144" y1="206" x2="170" y2="206"/>
      <path d="M165 202 L170 206 L165 210"/>
    </g>
    <!-- full segment -->
    <rect x="176" y="196" width="116" height="20" rx="10" fill="none" stroke="#D3B36B" stroke-width="1.4"/>
    <text x="234" y="210" fill="#D3B36B" font-size="10" font-weight="800" text-anchor="middle">本契約</text>
  </g>
  </g>
</svg>
